name: Deploy to Cloud Run (GCP)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'

env:
  PROJECT_ID: project-f281922f-0040-402f-b61
  REGION: us-central1
  SERVICE: newstostocks

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/apps/${{ env.SERVICE }}"
          BUILD_ID=$(gcloud builds submit --async --tag "$IMAGE" --format="value(id)")
          echo "Build ID: $BUILD_ID"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format="value(status)")
            echo "Status: $STATUS"
            case "$STATUS" in
              SUCCESS) break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Build failed with status $STATUS"
                exit 1
                ;;
            esac
            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/apps/${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --port 7860 \
            --allow-unauthenticated

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "## NewsToStocks deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** $URL" >> $GITHUB_STEP_SUMMARY
